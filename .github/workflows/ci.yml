name: CI

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Guard — providers must not hand-write inputSchema (single source of truth)
        run: |
          if grep -rn "inputSchema" src/providers; then
            echo "::error::Providers must declare tools via defineTool (zod). Hand-written inputSchema is forbidden (ADR: canonical-provider-pattern)."
            exit 1
          fi
      - name: Format check
        run: npm run format:check
      - name: Type check
        run: npm run typecheck
      - name: Tests
        run: npm test
      - name: Audit (high+ severity)
        run: npm audit --audit-level=high
